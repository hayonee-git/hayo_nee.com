name: Deploy to GitHub Pages

on:
  # Trigger the workflow every time you push to the `main` branch
  # Using a different branch name? Replace `main` with your branch’s name
  push:
    branches: [ main ]
  # Allows you to run this workflow manually from the Actions tab on GitHub.
  workflow_dispatch:

# Allow this job to clone the repo and create a page deployment
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repository using git
        uses: actions/checkout@v6
      - name: Install dependencies (explicit)
        run: |
          cd hayo_nee
          npm ci
          # make sure local astro binary is executable
          chmod +x ./node_modules/.bin/astro || true
      - name: Install, build, and upload your site
        uses: withastro/action@v6
        with:
          # Set the path to the Astro project inside this repository.
          # The site's package.json and build scripts are under the `hayo_nee` folder.
          path: "hayo_nee"
          # node-version: 24 # optional: uncomment to pin Node version
          # package-manager: pnpm@latest # optional: pin package manager
          # build-cmd: pnpm run build # optional: custom build command
        # env:
          # PUBLIC_POKEAPI: 'https://pokeapi.co/api/v2' # Use single quotation marks for the variable value. (optional)

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5